# This is a Databricks asset bundle definition for dbx_futbol_data.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: dbx_futbol_data
  uuid: 26881cba-f280-4cdd-bfb0-6450193ab21e

include:
  - resources/*.yml

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-e18e2fd0-8249.cloud.databricks.com
    variables:
      catalog: futbol
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: https://dbc-e18e2fd0-8249.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/ronald12chicche@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/ronald12chicche@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: futbol
      schema: prod
    permissions:
      - user_name: ronald12chicche@gmail.com
        level: CAN_MANAGE
